name: Build multi-arch images
on:
  workflow_dispatch:

jobs:
  build-local:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: otel-poc-csharp-service
            context: ./services/csharp-service
            file: ./services/csharp-service/Dockerfile
            image: otel-poc-csharp-service
          - name: otel-poc-go-service
            context: ./services/go-service
            file: ./services/go-service/Dockerfile
            image: otel-poc-go-service
          - name: otel-poc-python-service
            context: ./services/python-service
            file: ./services/python-service/Dockerfile
            image: otel-poc-python-service
          - name: otel-poc-cpp-service
            context: ./services/cpp-service
            file: ./services/cpp-service/Dockerfile
            image: otel-poc-cpp-service
          - name: otel-poc-rust-service
            context: ./services/rust-service
            file: ./services/rust-service/Dockerfile
            image: otel-poc-rust-service
    env:
      PROJECT_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
        with: { platforms: amd64,arm64 }
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
