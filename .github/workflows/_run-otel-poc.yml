name: Run OTel PoC

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      label:
        required: true
        type: string
      runtime:
        required: true
        type: string
        description: "compose | k8s"

jobs:
  test:
    runs-on: ${{ inputs.runner }}
    name: ${{ inputs.label }}
    timeout-minutes: 30
    env:
      PROJECT_ROOT: ${{ github.workspace }}
      COMPOSE_FILE: infra/compose/docker-compose.ci.yml
      RUNTIME: ${{ inputs.runtime }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest deps
        run: pip install pytest requests

      # ── k8s-only prerequisites ────────────────────────────────────
      - name: Set up kind cluster
        if: inputs.runtime == 'k8s'
        uses: helm/kind-action@v1
        with:
          cluster_name: kind

      - name: Install Helm
        if: inputs.runtime == 'k8s'
        uses: azure/setup-helm@v4

      # ── Runtime-agnostic lifecycle ────────────────────────────────
      - name: Start stack
        run: make start

      - name: Start port-forwards (k8s only)
        if: inputs.runtime == 'k8s'
        run: make forward-bg

      - name: Generate test traffic + assert telemetry landed
        run: make test

      # ── Diagnostics ───────────────────────────────────────────────
      - name: Dump logs on failure
        if: failure()
        run: |
          if [ "${RUNTIME}" = "compose" ]; then
            for svc in go-service python-service csharp-service cpp-service rust-service; do
              echo "=== $svc ==="
              docker compose -f "${COMPOSE_FILE}" logs --tail=200 "$svc" 2>/dev/null || true
            done
          else
            echo "=== Pods ==="
            kubectl get pods -A -o wide
            echo "=== Events ==="
            kubectl get events -A --sort-by=.lastTimestamp | tail -50
            for deploy in go-otel-service python-otel-service csharp-otel-service cpp-otel-service rust-otel-service; do
              echo "=== $deploy ==="
              kubectl -n default logs "deploy/$deploy" --tail=200 2>/dev/null || true
            done
          fi

      # ── Tear down ─────────────────────────────────────────────────
      - name: Stop port-forwards (k8s only)
        if: always() && inputs.runtime == 'k8s'
        run: make forward-stop

      - name: Stop stack
        if: always()
        run: make stop
