name: Run OTel PoC

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      label:
        required: true
        type: string
      runtime:
        required: true
        type: string
        description: "compose | k8s"

jobs:
  test:
    runs-on: ${{ inputs.runner }}
    name: ${{ inputs.label }}
    timeout-minutes: 30
    env:
      PROJECT_ROOT: ${{ github.workspace }}
      COMPOSE_FILE: infra/compose/docker-compose.ci.yml
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest deps
        run: pip install pytest requests

      # ── Compose path ──────────────────────────────────────────────
      - name: Start stack (compose)
        if: inputs.runtime == 'compose'
        run: make compose-start

      - name: Generate test traffic + assert telemetry landed (compose)
        if: inputs.runtime == 'compose'
        run: make compose-traffic-assert

      # ── k8s path ──────────────────────────────────────────────────
      - name: Set up kind cluster
        if: inputs.runtime == 'k8s'
        uses: helm/kind-action@v1
        with:
          cluster_name: kind

      - name: Install Helm
        if: inputs.runtime == 'k8s'
        uses: azure/setup-helm@v4

      - name: Deploy to kind
        if: inputs.runtime == 'k8s'
        run: make k8s-deploy

      - name: Start port-forwards
        if: inputs.runtime == 'k8s'
        run: make k8s-forward-bg

      - name: Generate test traffic + assert telemetry landed (k8s)
        if: inputs.runtime == 'k8s'
        run: make k8s-traffic-assert

      # ── Diagnostics ───────────────────────────────────────────────
      - name: Dump logs on failure (compose)
        if: failure() && inputs.runtime == 'compose'
        run: |
          for svc in go-service python-service csharp-service cpp-service rust-service; do
            echo "=== $svc ===" && docker compose -f infra/compose/docker-compose.yml \
              logs --tail=200 $svc 2>/dev/null || true
          done

      - name: Dump logs on failure (k8s)
        if: failure() && inputs.runtime == 'k8s'
        run: |
          echo "=== Pods ==="
          kubectl get pods -A -o wide
          echo "=== Events ==="
          kubectl get events -A --sort-by=.lastTimestamp | tail -50
          for deploy in go-service python-service csharp-service cpp-service rust-service; do
            echo "=== $deploy ==="
            kubectl -n default logs deploy/$deploy --tail=200 2>/dev/null || true
            kubectl -n default logs deploy/$deploy -c istio-proxy --tail=100 2>/dev/null || true
          done

      # ── Tear down ─────────────────────────────────────────────────
      - name: Tear down (compose)
        if: always() && inputs.runtime == 'compose'
        run: make compose-clean

      - name: Tear down (k8s)
        if: always() && inputs.runtime == 'k8s'
        run: |
          make k8s-forward-stop
          make k8s-clean
