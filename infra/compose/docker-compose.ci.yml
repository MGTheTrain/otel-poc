services:
  # OpenTelemetry Collector - central hub for telemetry data
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.140.1
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ${PROJECT_ROOT}/configs/otel-collector/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics exposed by the collector
      - "8889:8889"   # Prometheus exporter metrics
    networks:
      - otel-network

  # Jaeger - distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:1.53.0
    container_name: jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - otel-network

  # Prometheus - metrics storage
  prometheus:
    image: prom/prometheus:v3.8.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ${PROJECT_ROOT}/configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - otel-network

  # Loki - log aggregation
  loki:
    image: grafana/loki:3.5.7
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - otel-network

  # Grafana - visualization
  grafana:
    image: grafana/grafana:12.3.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ${PROJECT_ROOT}/configs/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - otel-network

  # Microservices
  csharp-service:
    container_name: csharp-service
    image: mgthetrain987/otel-poc-csharp-service:latest
    ports:
      - "5001:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_SERVICE_NAME=csharp-service
    depends_on:
      - otel-collector
    networks:
      - otel-network

  go-service:
    container_name: go-service
    image: mgthetrain987/otel-poc-go-service:latest
    ports:
      - "5002:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_SERVICE_NAME=go-service
    depends_on:
      - otel-collector
    networks:
      - otel-network

  python-service:
    container_name: python-service
    image: mgthetrain987/otel-poc-python-service:latest
    ports:
      - "5003:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_SERVICE_NAME=python-service
    depends_on:
      - otel-collector
    networks:
      - otel-network

  rust-service:
    container_name: rust-service
    image: mgthetrain987/otel-poc-rust-service:latest
    ports:
      - "5004:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=rust-service
    depends_on:
      - otel-collector
    networks:
      - otel-network

  cpp-service:
    container_name: cpp-service
    image: mgthetrain987/otel-poc-cpp-service:latest
    ports:
      - "5005:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_SERVICE_NAME=cpp-service
    depends_on:
      - otel-collector
    networks:
      - otel-network

networks:
  otel-network:
    driver: bridge
