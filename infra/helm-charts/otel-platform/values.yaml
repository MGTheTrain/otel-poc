# Jaeger — in-memory all-in-one. Same as the bash script's --set flags.
# `allInOne.enabled: true` is sufficient; don't disable the agent/
# collector/query subblocks, as some chart versions read those flags
# to gate the Kubernetes Services (not just the deployments). Leave at
# defaults and let allInOne mode drive the topology.
jaeger:
  fullnameOverride: jaeger
  enabled: true
  provisionDataStore:
    cassandra: false
  storage:
    type: memory
  allInOne:
    enabled: true
  agent:
    enabled: false
  collector:
    enabled: false
  query:
    enabled: false

# Loki — single-binary mode with filesystem storage. PoC-grade.
loki:
  fullnameOverride: loki
  enabled: true
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    useTestSchema: true
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
  singleBinary:
    replicas: 1
  lokiCanary:
    enabled: false
  test:
    enabled: false
  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
  # Explicitly disable all distributed components
  write:      { replicas: 0 }
  read:       { replicas: 0 }
  backend:    { replicas: 0 }
  ingester:   { replicas: 0 }
  distributor:    { replicas: 0 }
  querier:        { replicas: 0 }
  queryFrontend:  { replicas: 0 }
  compactor:      { replicas: 0 }
  indexGateway:   { replicas: 0 }
  chunksCache:    { enabled: false }
  resultsCache:   { enabled: false }
  minio:          { enabled: false }
  gateway:
    enabled: true
    service:
      type: ClusterIP

# Prometheus — scrapes the OTel Collector's /metrics endpoint.
prometheus:
  fullnameOverride: prometheus
  enabled: true
  alertmanager:
    enabled: false
  kube-state-metrics:
    fullnameOverride: kube-state-metrics
    enabled: true
  prometheus-node-exporter:
    fullnameOverride: prometheus-node-exporter
    enabled: true
  pushgateway:
    enabled: false
  server:
    fullnameOverride: prometheus-server
    service:
      type: ClusterIP
  serverFiles:
    prometheus.yml:
      scrape_configs:
        - job_name: otel-collector
          scrape_interval: 15s
          static_configs:
            - targets:
                - otel-collector.default.svc.cluster.local:8889

# OpenTelemetry Collector — receives OTLP, fans out to Jaeger / Prometheus / Loki.
otel-collector:
  fullnameOverride: otel-collector
  enabled: true
  mode: deployment
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: ""   # chart default
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
    exporters:
      otlp/jaeger:
        endpoint: jaeger-collector.default.svc.cluster.local:4317
        tls:
          insecure: true
      prometheus:
        endpoint: 0.0.0.0:8889
        namespace: otel
      otlphttp/loki:
        endpoint: http://loki-gateway:80/otlp
        tls:
          insecure: true
      debug:
        verbosity: detailed
    service:
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [batch]
          exporters:  [otlp/jaeger, debug]
        metrics:
          receivers:  [otlp]
          processors: [batch]
          exporters:  [prometheus, debug]
        logs:
          receivers:  [otlp]
          processors: [batch]
          exporters:  [otlphttp/loki, debug]
  ports:
    otlp:
      enabled: true
    otlp-http:
      enabled: true
    metrics:
      enabled: true
      containerPort: 8889
      servicePort: 8889
      protocol: TCP

# Grafana — preconfigured datasources pointing at the in-cluster stack.
grafana:
  fullnameOverride: grafana
  enabled: true
  service:
    type: ClusterIP
  adminPassword: admin
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-server:80
          isDefault: true
        - name: Jaeger
          type: jaeger
          url: http://jaeger-query:16686
        - name: Loki
          type: loki
          url: http://loki-gateway:80
  env:
    GF_AUTH_ANONYMOUS_ENABLED: "true"
    GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
