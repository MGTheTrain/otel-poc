apiVersion: v2
name: otel-platform
description: Observability stack — Jaeger, Loki, Prometheus, OTel Collector, Grafana.
type: application
version: 0.1.0
appVersion: "0.1.0"

# All upstream community charts. Versions pinned to the ones the deploy
# script previously hardcoded.
dependencies:
  - name: jaeger
    version: "3.3.3"
    repository: https://jaegertracing.github.io/helm-charts
    condition: jaeger.enabled
  - name: loki
    version: "6.46.0"
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled
  - name: prometheus
    version: "27.50.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  - name: opentelemetry-collector
    alias: otel-collector
    version: "0.140.1"
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    condition: otel-collector.enabled
  - name: grafana
    version: "10.3.0"
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled