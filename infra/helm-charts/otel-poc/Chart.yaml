apiVersion: v2
name: otel-poc
description: OpenTelemetry PoC umbrella — observability stack plus 5 demo services.
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: otel-platform
    version: "0.1.0"
    repository: "file://../otel-platform"

  - name: cpp-service
    version: "0.1.0"
    repository: "file://../services/cpp-service"
    condition: cpp-service.enabled
  - name: csharp-service
    version: "0.1.0"
    repository: "file://../services/csharp-service"
    condition: csharp-service.enabled
  - name: go-service
    version: "0.1.0"
    repository: "file://../services/go-service"
    condition: go-service.enabled
  - name: python-service
    version: "0.1.0"
    repository: "file://../services/python-service"
    condition: python-service.enabled
  - name: rust-service
    version: "0.1.0"
    repository: "file://../services/rust-service"
    condition: rust-service.enabled
