rust-otel-service:
  fullnameOverride: rust-otel-service
  <<: *serviceDefaults
  image: { repository: otel-poc-rust-otel-service, pullPolicy: Never, tag: latest }
  env:
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://otel-collector:4317   # rust SDK wants the scheme
    - name: OTEL_SERVICE_NAME
      value: rust-otel-service
