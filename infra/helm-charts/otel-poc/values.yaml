# Observability stack — defaults from otel-platform/values.yaml apply.
# Override here only if you need different topology.
otel-platform: {}

# One block per service. Keys match the subchart names from Chart.yaml.
# Image policy is `Never` because images are kind-loaded, not pulled.
_serviceDefaults: &serviceDefaults
  image:
    pullPolicy: IfNotPresent
    tag: latest
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  livenessProbe:
    httpGet:
      port: 8080
  readinessProbe:
    httpGet:
      port: 8080

# Rust uses an http:// prefix; everything else uses bare host:port. Matches
# what the bash script set per-service.
cpp-service:
  fullnameOverride: cpp-service
  <<: *serviceDefaults
  image: { repository: mgthetrain987/otel-poc-cpp-service, pullPolicy: IfNotPresent, tag: latest }
  env:
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: otel-collector:4317
    - name: OTEL_SERVICE_NAME
      value: cpp-service

csharp-service:
  fullnameOverride: csharp-service
  <<: *serviceDefaults
  image: { repository: mgthetrain987/otel-poc-csharp-service, pullPolicy: IfNotPresent, tag: latest }
  env:
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: otel-collector:4317
    - name: OTEL_SERVICE_NAME
      value: csharp-service

go-service:
  fullnameOverride: go-service
  <<: *serviceDefaults
  image: { repository: mgthetrain987/otel-poc-go-service, pullPolicy: IfNotPresent, tag: latest }
  env:
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: otel-collector:4317
    - name: OTEL_SERVICE_NAME
      value: go-service

python-service:
  fullnameOverride: python-service
  <<: *serviceDefaults
  image: { repository: mgthetrain987/otel-poc-python-service, pullPolicy: IfNotPresent, tag: latest }
  env:
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: otel-collector:4317
    - name: OTEL_SERVICE_NAME
