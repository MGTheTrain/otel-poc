rust-service:
  fullnameOverride: rust-service
  <<: *serviceDefaults
  image: { repository: mgthetrain987/otel-poc-rust-service, pullPolicy: IfNotPresent, tag: latest }
  env:
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://otel-collector:4317   # rust SDK wants the scheme
    - name: OTEL_SERVICE_NAME
      value: rust-service
